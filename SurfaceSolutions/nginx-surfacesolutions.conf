server {
    listen 80;
    server_name surfacesolutions.se www.surfacesolutions.se;
    root /var/www/SurfaceSolutions/public;
    index index.php;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~* \.(css|js|jpg|jpeg|png|webp|svg|ico)$ {
        expires 30d;
        access_log off;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 120;
    }

    location ~ /(app|database|storage|config|\.git) { deny all; }
    location ~* \.(sql|env|ini|log|sh)$ { deny all; }
    location ^~ /storage/logs { deny all; }
}
